{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete</title>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <form method="POST">
                        {% csrf_token %}

                             <p>Are you sure you want to delete "{{ student.id.url }}"?</p>
                            <button type="submit">Confirm Delete</button>
                            <a href="{% url 'dashboard' %}">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
