{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete</title>
</head>
<body>

{% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                {{ message }}
            </li>
        {% endfor %}
    </ul>
{% endif %}



<div class="container mt-5">
     <form method="POST">
     {% csrf_token %}

       <p>Are you sure you want to delete "{{ student.name }}"?</p>
       <button type="submit">
           Confirm Delete</button>
       <a href="{% url 'dashboard' %}">Cancel</a>

     </form>
</div>
</body>
</html>
