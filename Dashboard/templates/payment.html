<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pay with M-Pesa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

{% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                {{ message }}
            </li>
        {% endfor %}
    </ul>
{% endif %}


<div class="container">
    <div class="col-6" style="align-content: center">

        <form action="" method="POST">
            {% csrf_token %}


            <input type="text" name="phone" placeholder="Enter Phone Number" class="form-control" required><br>
            <input type="number" name="amount" placeholder="Enter Amount" class="form-control" required><br>
            <button type="submit" class="btn btn-success">SEND PROMPT</button>
        </form>
      </div>
</div>


</body>
</html>
