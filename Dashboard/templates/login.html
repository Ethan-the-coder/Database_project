<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        .messages {
            list-style: none;
            padding: 0;
        }
        .message-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .message-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        /* Add styles for other message levels (info, warning) */
    </style>
</head>
<body>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li{% if message.tags %} class="{{ message.tags }} message-{{ message.level_tag }}"{% endif %}>
                        {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}



<div class="container">
    <div class="col-6" style="align-content: center">
        <h4>Login here</h4>
        <form action="" method="POST">
            {% csrf_token %}


            <input type="text" name="username" placeholder="Username" class="form-control"><br>
            <input type="password" name="password" placeholder="Password" class="form-control"><br>
            <button type="submit" class="btn btn-primary">Log In</button>
            <br>
            <p>Don't have an account? <a href="{% url 'signup' %}">Sign up here!</a></p>
        </form>
      </div>
</div>
</body>
</html>
